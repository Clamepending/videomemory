services:
  videomemory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videomemory
    restart: unless-stopped
    environment:
      PORT: "5050"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
    ports:
      - "5050:5050"      # Frontend + core HTTP API
    volumes:
      - videomemory-data:/root/.local/share/videomemory

volumes:
  videomemory-data:
