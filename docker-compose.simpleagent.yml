services:
  videomemory:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videomemory
    restart: unless-stopped
    environment:
      PORT: "5050"
      RTMP_SERVER_HOST: "${RTMP_SERVER_HOST:-}"
      RTMP_INGEST_INTERNAL_HOST: "127.0.0.1"
      VIDEOMEMORY_RTSP_PULL_PORT: "8554"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
    ports:
      - "5050:5050"      # Frontend + core HTTP API
      - "1935:1935"      # RTMP push from Android
      - "8554:8554"      # RTSP pull for VideoMemory ingest
      - "8890:8890"      # SRT ingest
      - "8889:8889"      # WebRTC/WHIP signaling endpoint (MediaMTX)
      - "8189:8189/udp"  # WebRTC ICE/UDP (MediaMTX default)
    volumes:
      - videomemory-data:/root/.local/share/videomemory

  simpleagent:
    build:
      context: ${SIMPLEAGENT_BUILD_CONTEXT:-../simpleagent}
      dockerfile: Dockerfile
    container_name: simpleagent
    restart: unless-stopped
    environment:
      PORT: "18789"
      SIMPLEAGENT_SERVICE_MODE: "all"
      SIMPLEAGENT_EXECUTOR_AUTO_RUN: "0"
      SIMPLEAGENT_DELIVERY_AUTO_RUN: "0"
      SIMPLEAGENT_WEB_ENABLED: "1"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    depends_on:
      - videomemory
    ports:
      - "18889:18789"    # SimpleAgent UI + API

volumes:
  videomemory-data:
